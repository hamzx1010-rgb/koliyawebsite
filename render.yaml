# ============================================================
#  كُلِّيَّة (Koliya) — Render Blueprint
#  This file tells Render exactly how to deploy your app.
#  Docs: https://render.com/docs/blueprint-spec
# ============================================================

services:
  - type: web
    name: koliya
    runtime: static
    # Your app is a single index.html — no build needed.
    buildCommand: ""
    # Serve everything from the repo root (where index.html lives).
    staticPublishPath: .
    pullRequestPreviewsEnabled: false   # set true if you want PR previews later
    # Tell browsers to cache static assets for speed.
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=3600
    # SPA fallback: send all routes to index.html (not strictly needed
    # since our routing is in-memory, but keeps deep links safe).
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
